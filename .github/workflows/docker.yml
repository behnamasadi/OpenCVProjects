name: Docker CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build image & build/test C++ inside it
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build image (load to local daemon)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: opencvprojects:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & test C++ inside the image
        run: |
          docker run --rm \
            -v "$(pwd)":/OpenCVProjects \
            -w /OpenCVProjects \
            opencvprojects:ci \
            bash -c '
              set -e
              cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
              cmake --build build -j
              ctest --test-dir build --output-on-failure --no-tests=ignore
            '

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
